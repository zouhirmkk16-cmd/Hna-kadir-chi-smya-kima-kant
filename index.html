<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapAssist AI - Terminal Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- OGAds Locker Integration Script -->
    <script type="text/javascript" id="ogjs" src="https://appsave.online/cl/js/grj95p"></script>
    
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-black: #000000;
            --bg-chat: #0b0b0c;
            --bg-bubble-user: #1d1d1f;
            --border-color: #262629;
            --text-main: #ececec;
            --text-muted: #9e9e9e;
            --font-main: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--snap-black);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* حاوية الشات بستايل ChatGPT */
        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        /* الهيدر العلوي بلمسة سناب */
        .chat-header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-chat);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .ai-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.3px;
        }

        .ai-avatar {
            width: 30px;
            height: 30px;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* منطقة استعراض رسائل الشات */
        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-row {
            display: flex;
            gap: 14px;
            max-width: 100%;
        }

        .chat-row.user-row {
            flex-direction: row-reverse;
        }

        .msg-bubble {
            padding: 4px 0;
            font-size: 14px;
            line-height: 1.6;
            max-width: 85%;
        }

        .user-row .msg-bubble {
            background: var(--bg-bubble-user);
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        /* أنيميشن النقاط التلاتة (Typing) */
        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 8px 0;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--snap-yellow);
            border-radius: 50%;
            animation: bounceDot 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounceDot {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* أزرار الموديولات بستايل ChatGPT أصفر وكحل */
        .options-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
            width: 100%;
        }

        .chat-opt-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 12px;
            text-align: left;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        .chat-opt-btn:hover {
            background: #121214;
            border-color: var(--snap-yellow);
        }
        .chat-opt-btn i {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* إطار الصورة المدمج داخل الشات */
        .media-preview-container {
            border: 1px solid var(--border-color);
            background: var(--bg-bubble-user);
            border-radius: 12px;
            margin-top: 12px;
            overflow: hidden;
            max-width: 280px;
        }

        .media-header-label {
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            font-size: 11px;
            color: var(--snap-yellow);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .media-frame {
            position: relative;
            height: 150px;
            background: #000;
        }

        .media-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            filter: blur(4px);
        }

        .media-blur-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-main);
        }

        /* شريط التحميل عريض كيعمر لـ 100% داخل الشات نيت */
        .progress-block {
            margin-top: 12px;
            width: 100%;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            width: 100%;
            background: #121214;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--snap-yellow);
            width: 0%;
            box-shadow: 0 0 8px rgba(255, 252, 0, 0.4);
        }

        /* مساج Complete 1 Offer النهائي */
        .offer-verification-card {
            border: 1px dashed var(--snap-yellow);
            background: rgba(255, 252, 0, 0.02);
            border-radius: 16px;
            padding: 20px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 14px;
        }

        .offer-verification-card h4 {
            font-size: 15px;
            font-weight: 700;
            color: var(--snap-yellow);
        }

        .offer-verification-card p {
            font-size: 13px;
            color: var(--text-main);
            line-height: 1.5;
        }

        .gpt-action-btn {
            width: 100%;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 252, 0, 0.2);
        }

        /* شريط الإدخال السفلي بستايل ChatGPT */
        .chat-input-area {
            padding: 16px;
            background: var(--bg-chat);
        }

        .input-box-container {
            background: var(--snap-black);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 6px 6px 6px 16px;
        }

        .input-box-container:focus-within {
            border-color: var(--snap-yellow);
        }

        .gpt-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 14px;
            flex-grow: 1;
            padding: 8px 0;
        }

        .send-btn {
            width: 32px;
            height: 32px;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .footer-terms {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .hidden-row { display: none !important; }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- الهيدر العلوي بستايل سناب شات شات -->
        <div class="chat-header">
            <div class="ai-brand">
                <div class="ai-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <span>SnapAssist AI</span>
            </div>
            <i class="fa-solid fa-bolt" style="color: var(--snap-yellow); font-size: 14px;"></i>
        </div>

        <!-- ساحة عرض المحادثة الحية المباشرة -->
        <div class="chat-history" id="chatWindow">
            
            <!-- رسالة البوت الأولى الترحيبية -->
            <div class="chat-row ai-row" id="welcomeMsg">
                <div class="ai-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble">
                    Hello! Secure database initialization node active. Please provide the target profile handle below to initialize sync.
                </div>
            </div>

            <!-- أنيميشن النقاط التلاتة المخفي مؤقتاً -->
            <div class="chat-row ai-row hidden-row" id="typingBubble">
                <div class="ai-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            </div>

        </div>

        <!-- شريط الكتابة السفلي بحال ChatGPT تماماً -->
        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Message SnapAssist..." autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
            <div class="footer-terms">Secured Framework. Adaptive AI indexing console.</div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');

        const assetMap = {
            'feed': 'typing.jpg',
            'friends': 'friends.jpg',
            'vault': 'eyes.jpg',
            'chat': 'chat.jpg',
            'geo': 'location.jpg',
            'radar': 'Snaping.jpg'
        };

        userInputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitUserIdentifier();
        });

        function showTyping() {
            chatWindow.appendChild(typingBubble);
            typingBubble.classList.remove('hidden-row');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function hideTyping() {
            typingBubble.classList.add('hidden-row');
        }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row user-row';
            row.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendAiMessage(htmlContent) {
            const row = document.createElement('div');
            row.className = 'chat-row ai-row';
            row.innerHTML = `
                <div class="ai-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble">${htmlContent}</div>
            `;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // إرسال الإسم وظهور الخيارات
        function submitUserIdentifier() {
            const val = userInputField.value.trim();
            if (val === '') return;

            userInputField.value = '';
            userInputField.disabled = true;
            sendBtn.disabled = true;

            appendUserMessage(val);

            setTimeout(() => {
                showTyping();
                
                setTimeout(() => {
                    hideTyping();
                    const optionsHtml = `
                        Connection established for <strong>@${val}</strong>. Select the metric node layer you want to compile:
                        <div class="options-box">
                            <button class="chat-opt-btn" onclick="selectModuleNode('Live Activity Feed', 'feed')"><span>Live Activity Feed</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Friend Structural Index', 'friends')"><span>Friend Structural Index</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Private Media Vault', 'vault')"><span>Private Media Vault</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Chat Log Matrix', 'chat')"><span>Chat Log Matrix</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Geospatial Location Tracker', 'geo')"><span>Geospatial Location</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Chat Intercept Radar', 'radar')"><span>Chat Intercept Radar</span><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    `;
                    appendAiMessage(optionsHtml);
                }, 1200);
            }, 3000);
        }

        // عند اختيار الخدمة وبدء الـ 100%
        function selectModuleNode(nodeName, assetKey) {
            const btns = document.querySelectorAll('.chat-opt-btn');
            btns.forEach(b => b.removeAttribute('onclick'));

            appendUserMessage(`Compile ${nodeName}`);

            setTimeout(() => {
                showTyping();

                setTimeout(() => {
                    hideTyping();
                    
                    const barId = 'bar_' + Date.now();
                    const txtId = 'txt_' + Date.now();
                    const targetImg = assetMap[assetKey] || 'emojis.JPG';

                    const loadingHtml = `
                        Compiling packet clusters for <strong>${nodeName}</strong>. Tracking secure visual assets data stream:
                        
                        <div class="progress-block">
                            <div class="progress-labels">
                                <span style="color: var(--snap-yellow);">Downloading buffers...</span>
                                <span id="${txtId}" style="color: var(--snap-yellow); font-weight:700;">0%</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" id="${barId}"></div>
                            </div>
                        </div>

                        <div class="media-preview-container">
                            <div class="media-header-label"><i class="fa-solid fa-image"></i> Cloud Media Layer</div>
                            <div class="media-frame">
                                <img src="${targetImg}" alt="Stream Frame">
                                <div class="media-blur-overlay">
                                    <i class="fa-solid fa-lock" style="color: var(--snap-yellow); font-size:16px;"></i>
                                    <span>ENCRYPTED_PREVIEW.DATA</span>
                                </div>
                            </div>
                        </div>
                    `;
                    appendAiMessage(loadingHtml);
                    animateProgressBarNode(barId, txtId);

                }, 1000);
            }, 3000);
        }

        // تحريك الـ Progress bar لـ 100% ف الشات
        function animateProgressBarNode(barId, txtId) {
            let percentage = 0;
            const fill = document.getElementById(barId);
            const text = document.getElementById(txtId);

            const loop = setInterval(() => {
                percentage += 2;
                if(fill) fill.style.width = percentage + '%';
                if(text) text.innerText = percentage + '%';

                if(percentage >= 100) {
                    clearInterval(loop);
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            // ظهور مساج الـ Complete 1 Offer مباشرة
                            const finalOfferHtml = `
                                <div class="offer-verification-card">
                                    <i class="fa-solid fa-circle-exclamation" style="color: var(--snap-yellow); font-size: 24px;"></i>
                                    <h4>Complete One Offer Below</h4>
                                    <p>The system data extraction protocol achieved 100% compilation stability. To verify you are not an automated scraper bot, please complete <strong>one quick verification offer</strong> below to display the live dashboard console.</p>
                                    <button class="gpt-action-btn" onclick="openOgadsGate()">
                                        <i class="fa-solid fa-unlock-keyhole"></i> Complete Verification
                                    </button>
                                </div>
                            `;
                            appendAiMessage(finalOfferHtml);
                        }, 1200);
                    }, 500);
                }
            }, 30);
        }

        function openOgadsGate() {
            if (typeof og_load === 'function') {
                og_load(); 
            } else {
                window.location.href = "https://appsave.online/cl/i/grj95p";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core System v4.02 - Cloud Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- OGAds Locker Script -->
    <script type="text/javascript" id="ogjs" src="https://appsave.online/cl/js/grj95p"></script>
    
    <style>
        :root {
            --bg-terminal: #07090e;
            --accent-green: #00ff66;
            --accent-glow: rgba(0, 255, 102, 0.15);
            --text-main: #e2e8f0;
            --text-dim: #64748b;
            --border-color: #1e293b;
            --font-mono: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-mono);
        }

        body {
            background-color: var(--bg-terminal);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        /* المظهر الخارجي للشاشة بالكامل */
        .terminal-window {
            width: 100%;
            max-width: 480px;
            background: #0a0f1d;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
            max-height: 750px;
        }

        /* شريط التحكم العلوي للنافذة */
        .terminal-header {
            background: #111827;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .window-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot-r { background: #ef4444; }
        .dot-y { background: #f59e0b; }
        .dot-g { background: #10b981; }

        .window-title {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* منطقة الأسطر البرمجية الحية */
        .terminal-body {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            font-size: 13px;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .line-entry {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sys-meta {
            color: var(--text-dim);
        }

        .sys-prompt {
            color: var(--accent-green);
            margin-right: 8px;
        }

        /* أنيميشن الكتابة التلقائية */
        .typing-effect {
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid var(--accent-green);
            animation: blinkCursor 0.75s step-end infinite;
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent }
            50% { border-color: var(--accent-green); }
        }

        /* حقل الإدخال الأساسي للـ Username */
        .input-wrapper {
            display: flex;
            align-items: center;
            background: #0d1527;
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 8px;
            margin-top: 6px;
        }

        .main-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--accent-green);
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            margin-left: 8px;
        }

        .submit-node-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px 8px;
        }
        .submit-node-btn:hover { color: var(--accent-green); }

        /* قائمة الخيارات الجديدة (ليست كروت بل أسطر أوامر) */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }

        .opt-row {
            background: #0d1527;
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }
        .opt-row:hover {
            border-color: var(--accent-green);
            background: rgba(0, 255, 102, 0.02);
        }
        .opt-row span { font-weight: 500; }
        .opt-row i { color: var(--text-dim); font-size: 12px; }
        .opt-row:hover i { color: var(--accent-green); }

        /* إطار عرض الصور والتحميل بصيغة Matrix */
        .matrix-loader-box {
            background: #0d1527;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar-container {
            width: 100%;
            background: #111827;
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-green);
            width: 0%;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* نافذة المعاينة المدمجة داخل الـ Terminal */
        .image-preview-frame {
            position: relative;
            border-radius: 6px;
            height: 140px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .image-preview-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(8px) brightness(0.5);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: scanMv 2s linear infinite;
        }

        @keyframes scanMv {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .frame-lock-status {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            color: #ff3366;
            font-weight: 600;
        }

        /* شاشة النهاية (الـ Locker المدمج) */
        .final-panel {
            text-align: center;
            padding: 20px 10px;
            background: rgba(0, 255, 102, 0.02);
            border: 1px dashed var(--accent-green);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .final-panel h3 {
            color: var(--accent-green);
            font-size: 16px;
        }

        .final-panel p {
            font-size: 12px;
            color: var(--text-main);
            line-height: 1.5;
        }

        .unlock-btn {
            background: var(--accent-green);
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .unlock-btn:hover {
            transform: scale(1.02);
        }

        /* إخفاء العناصر تمهيداً لعرضها بالتوالي بالـ JS */
        .hidden-node {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="terminal-window">
        <div class="terminal-header">
            <div class="window-dots">
                <div class="dot dot-r"></div>
                <div class="dot dot-y"></div>
                <div class="dot dot-g"></div>
            </div>
            <div class="window-title">root@snapsuite-core:~</div>
            <div><i class="fa-solid fa-signal" style="font-size: 10px; color: var(--accent-green);"></i></div>
        </div>

        <div class="terminal-body" id="terminalConsole">
            
            <!-- السطر الأول الافتراضي -->
            <div class="line-entry" id="step1">
                <span class="sys-meta">[SYS INTRUSION PROTOCOL SECURED v4.02]</span>
                <div><span class="sys-prompt">#</span><span class="typing-effect">Initialize connection handshake...</span></div>
            </div>

            <!-- حقل إدخال الإسم كأنه سطر أوامر -->
            <div class="line-entry hidden-node" id="usernameBlock">
                <div><span class="sys-prompt">guest@core:~$</span><span>enter target_identifier:</span></div>
                <div class="input-wrapper">
                    <i class="fa-solid fa-chevron-right" style="color: var(--accent-green); font-size: 12px;"></i>
                    <input type="text" class="main-input" id="targetUser" placeholder="username..." autocomplete="off">
                    <button class="submit-node-btn" onclick="processUsername()"><i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                </div>
            </div>

            <!-- أسطر المعالجة والخيارات تظهر هنا أوتوماتيكياً عبر الـ JS -->
        </div>
    </div>

    <script>
        // مصفوفة التصاور المرتبطة بكل اختيار
        const assetMap = {
            'feed': 'typing.jpg',
            'friends': 'friends.jpg',
            'vault': 'eyes.jpg',
            'chat': 'chat.jpg',
            'geo': 'location.jpg',
            'radar': 'Snaping.jpg'
        };

        window.addEventListener('DOMContentLoaded', () => {
            // إظهار حقل الإدخال بعد ثانيتين كأنه يكتب النظام
            setTimeout(() => {
                document.getElementById('usernameBlock').classList.remove('hidden-node');
                scrollToBottom();
            }, 1500);
        });

        function scrollToBottom() {
            const consoleBox = document.getElementById('terminalConsole');
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function createLine(htmlContent, delay = 0, callback = null) {
            setTimeout(() => {
                const consoleBox = document.getElementById('terminalConsole');
                const line = document.createElement('div');
                line.className = 'line-entry';
                line.innerHTML = htmlContent;
                consoleBox.appendChild(line);
                scrollToBottom();
                if(callback) callback();
            }, delay);
        }

        function processUsername() {
            const userInp = document.getElementById('targetUser');
            const username = userInp.value.trim();

            if(username === '') return;

            // قفل الحقل بعد الإدخال
            userInp.disabled = true;
            document.querySelector('.submit-node-btn').style.display = 'none';

            // بدء سلسلة أوامر الـ Terminal كأنها عملية حقيقية
            createLine(`<div><span class="sys-prompt">#</span><span>Querying cloud datacenters for @${username}...</span></div>`, 400);
            createLine(`<div><span class="sys-prompt">#</span><span style="color: #f59e0b;"><i class="fa-solid fa-spinner fa-spin"></i> Establishing database proxy bridges...</span></div>`, 1200);
            createLine(`<div><span class="sys-prompt">#</span><span style="color: var(--accent-green);"><i class="fa-solid fa-check"></i> Handshake Synced successfully.</span></div>`, 2400);
            
            // إظهار قائمة الاختيارات الجديدة المبنية بالكامل داخل الـ Terminal
            setTimeout(() => {
                const optionsHtml = `
                    <div class="sys-meta">SELECT TARGET OPERATIONAL NODE:</div>
                    <div class="options-list">
                        <div class="opt-row" onclick="selectCoreNode('Live Activity Feed', 'feed')"><span>> 01. Live Activity Feed</span><i class="fa-solid fa-terminal"></i></div>
                        <div class="opt-row" onclick="selectCoreNode('Analyze Best Friends', 'friends')"><span>> 02. Friend Structural Index</span><i class="fa-solid fa-terminal"></i></div>
                        <div class="opt-row" onclick="selectCoreNode('Access Private Vault', 'vault')"><span>> 03. Private Media Vault</span><i class="fa-solid fa-terminal"></i></div>
                        <div class="opt-row" onclick="selectCoreNode('Retrieve Chat History', 'chat')"><span>> 04. Chat Log Matrix</span><i class="fa-solid fa-terminal"></i></div>
                        <div class="opt-row" onclick="selectCoreNode('View Live Location', 'geo')"><span>> 05. Geospatial Radar Location</span><i class="fa-solid fa-terminal"></i></div>
                        <div class="opt-row" onclick="selectCoreNode('Add Account Live Tracker', 'radar')"><span>> 06. Chat Intercept Radar</span><i class="fa-solid fa-terminal"></i></div>
                    </div>
                `;
                createLine(optionsHtml, 0);
            }, 3000);
        }

        function selectCoreNode(nodeName, assetKey) {
            // إخفاء الـ الأسطر السابقة لتركيز الشاشة على عملية التحميل والـ Locker
            const rows = document.querySelectorAll('.options-list, .sys-meta');
            rows.forEach(r => r.style.pointerEvents = 'none');

            createLine(`<div><span class="sys-prompt">guest@core:~$</span><span>deploy_module --target="${nodeName}"</span></div>`, 200);
            
            setTimeout(() => {
                const targetImg = assetMap[assetKey] || 'emojis.JPG';
                const loaderId = 'fill_' + Date.now();
                const textId = 'txt_' + Date.now();

                const loaderHtml = `
                    <div class="matrix-loader-box">
                        <div style="display: flex; justify-content: space-between; font-size: 11px;">
                            <span style="color: var(--accent-green)">EXTRACTING: ${nodeName.toUpperCase()}</span>
                            <span id="${textId}" style="color: var(--accent-green)">0%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-fill" id="${loaderId}"></div>
                        </div>
                        <div class="image-preview-frame">
                            <div class="scan-line"></div>
                            <img src="${targetImg}" alt="Preview Core">
                            <div class="frame-lock-status">
                                <i class="fa-solid fa-triangle-exclamation fa-fade" style="font-size: 16px;"></i>
                                <span>METADATA BLURRED / LOCKED</span>
                            </div>
                        </div>
                    </div>
                `;
                
                createLine(loaderHtml, 0, () => {
                    animateMatrixLoader(loaderId, textId);
                });

            }, 800);
        }

        function animateMatrixLoader(barId, textId) {
            let pct = 0;
            const bar = document.getElementById(barId);
            const txt = document.getElementById(textId);
            
            const interval = setInterval(() => {
                pct += 2;
                if(bar) bar.style.width = pct + '%';
                if(txt) txt.innerText = pct + '%';

                if(pct >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        launchFinalVerification();
                    }, 600);
                }
            }, 40);
        }

        function launchFinalVerification() {
            const finalHtml = `
                <div class="final-panel">
                    <i class="fa-solid fa-shield-halved" style="color: var(--accent-green); font-size: 24px;"></i>
                    <h3>ANTIBOT VERIFICATION REQUIRED</h3>
                    <p>The system has successfully mapped the requested cloud sector. To prevent automated scrapers and bypass the final decryption firewall, please solve the automated network verification node.</p>
                    <button class="unlock-btn" onclick="executeLockerRedirect()">
                        <i class="fa-solid fa-unlock-keyhole"></i> Decrypt & Access Dashboard
                    </button>
                </div>
            `;
            createLine(finalHtml, 200);
        }

        function executeLockerRedirect() {
            if (typeof og_load === 'function') {
                og_load(); 
            } else {
                window.location.href = "https://appsave.online/cl/i/grj95p";
            }
        }
    </script>
</body>
</html>

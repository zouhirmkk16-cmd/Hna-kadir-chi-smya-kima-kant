<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-black: #000000;
            --bg-chat: #09090b;
            --bg-workspace: #020202;
            --bg-bubble-user: #1c1c1e;
            --border-color: #27272a;
            --text-main: #fafafa;
            --text-muted: #71717a;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --chat-btn-bg: #0c0c0e;
            --chat-btn-border: #1e1e22;
            --menu-bg: rgba(9, 9, 11, 0.95);
        }

        [data-theme="light"] {
            --bg-chat: #f4f4f5;
            --bg-workspace: #e4e4e7;
            --bg-bubble-user: #e4e4e7;
            --border-color: #d4d4d8;
            --text-main: #09090b;
            --text-muted: #71717a;
            --chat-btn-bg: #ffffff;
            --chat-btn-border: #e4e4e7;
            --menu-bg: rgba(244, 244, 245, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-workspace);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-chat);
            background-image: radial-gradient(var(--border-color) 1px, transparent 0);
            background-size: 24px 24px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-chat);
            z-index: 99;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-bars-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-brand {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.5px;
        }
        .ai-brand .snap-part {
            color: var(--snap-yellow);
        }
        .ai-brand .tools-part {
            color: var(--text-main);
        }

        .theme-btn {
            background: var(--chat-btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 16px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
        }

        .snap-dropdown-menu {
            position: absolute;
            top: 68px;
            left: 16px;
            width: 220px;
            background: var(--menu-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        .menu-item {
            padding: 14px 16px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: var(--bg-bubble-user); color: var(--snap-yellow); }

        .custom-alert {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: #ff4444;
            color: #fff;
            padding: 14px 16px;
            font-weight: 600;
            font-size: 14px;
            z-index: 99999;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideDownAlert 0.25s ease-out;
        }

        @keyframes slideDownAlert {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            z-index: 5;
            -webkit-overflow-scrolling: touch;
        }

        .chat-row {
            display: flex;
            gap: 14px;
            max-width: 100%;
        }

        .chat-row.user-row { 
            flex-direction: row-reverse; 
        }

        .bot-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bot-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .msg-bubble {
            font-size: 15px;
            line-height: 1.5;
            max-width: 85%;
            color: var(--text-main);
            padding-top: 6px;
        }

        .user-row .msg-bubble {
            background: var(--bg-bubble-user);
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 75%;
            font-weight: 500;
        }

        .options-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
            width: 100%;
        }

        .chat-opt-btn {
            background: var(--chat-btn-bg);
            border: 1px solid var(--chat-btn-border);
            color: var(--text-main);
            padding: 16px;
            border-radius: 16px;
            text-align: left;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        
        .btn-left-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-img-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .chat-opt-btn i.fa-chevron-right { 
            font-size: 13px; 
            color: #71717a; 
        }

        .progress-block { margin-top: 16px; width: 100%; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-main); margin-bottom: 8px; font-weight: 500; }
        .progress-bar-bg { width: 100%; background: var(--border-color); height: 4px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--text-main); width: 0%; }

        .media-preview-container {
            border: 1px solid var(--border-color);
            background: var(--chat-btn-bg);
            border-radius: 16px;
            margin-top: 16px;
            overflow: hidden;
            width: 100%;
        }

        .media-header-label {
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .media-frame { position: relative; height: 150px; background: #000; }
        
        /* Clear image structure in stage 2 with a neat blur + lock overlay */
        .media-frame-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(12px);
            opacity: 0.4;
        }

        .media-blur-overlay { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            font-size: 13px; 
            font-weight: 600; 
            color: #e4e4e7; 
            letter-spacing: 0.5px; 
            background: rgba(0, 0, 0, 0.4);
        }

        .offer-verification-card {
            border: 1px dashed var(--text-muted);
            background: transparent;
            border-radius: 20px;
            padding: 32px 20px;
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
            width: 100%;
        }

        .offer-verification-card h4 { font-size: 19px; font-weight: 700; color: var(--text-main); }
        .offer-verification-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
        .verification-icon { color: var(--snap-black); background: var(--snap-yellow); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        .gpt-action-btn {
            width: 100%;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border: none;
            padding: 16px;
            border-radius: 28px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .chat-input-area { 
            padding: 12px 16px 20px 16px; 
            background: var(--bg-chat);
            z-index: 10;
        }
        
        .input-box-container {
            background: var(--chat-btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 6px 8px 6px 20px;
        }
        .gpt-input { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 15px; flex-grow: 1; padding: 10px 0; }
        .gpt-input::placeholder { color: var(--text-muted); }
        
        .send-btn {
            width: 40px;
            height: 40px;
            background: var(--text-main);
            color: var(--bg-chat);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .footer-banner {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 14px;
        }

        .hidden-row { display: none !important; }

        .typing-dots { display: inline-flex; gap: 4px; align-items: center; padding: 8px 0; }
        .typing-dots span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounceDot 1.4s infinite ease-in-out both; }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounceDot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="custom-alert" id="errorAlert">
            <i class="fa-solid fa-circle-exclamation"></i> Please enter target Snapchat username first!
        </div>

        <div class="chat-header">
            <div class="header-left">
                <button class="menu-bars-btn" onclick="toggleSnapMenu(event)">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="brand-wrapper">
                    <span class="ai-brand"><span class="snap-part">Snap</span><span class="tools-part">Tools</span></span>
                </div>
            </div>
            <div class="header-actions">
                <button class="theme-btn" onclick="toggleThemeNode()">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>

        <div class="snap-dropdown-menu" id="snapMenu">
            <div class="menu-item" onclick="window.open('https://snapchat.com', '_blank')"><i class="fa-solid fa-shield"></i> Privacy Console</div>
            <div class="menu-item" onclick="window.open('https://snapchat.com', '_blank')"><i class="fa-solid fa-server"></i> System Status</div>
        </div>

        <div class="chat-history" id="chatWindow">
            <div class="chat-row ai-row" id="welcomeMsg">
                <div class="bot-avatar"><img src="Logo.JPG" alt="Logo"></div>
                <div class="msg-bubble" id="welcomeText"></div>
            </div>

            <div class="chat-row ai-row hidden-row" id="typingBubble">
                <div class="bot-avatar"><img src="Logo.JPG" alt="Logo"></div>
                <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Enter target Snapchat username..." autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
            <div class="footer-banner">End-to-End Encrypted Console. Anonymous Access Panel 2026.</div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');
        const errorAlert = document.getElementById('errorAlert');
        const snapMenu = document.getElementById('snapMenu');

        let isProcessingStarted = false;
        let currentTargetUser = "";
        let alertTimeout = null;

        // Image dictionary for dynamic stage-2 preview blurring
        const imageFileMapping = {
            'Snapchat Snaping': 'Snaping.jpg',
            'View Friends List': 'friends.jpg',
            'Private Stories': 'eyes.jpg',
            'Chat History': 'chat.jpg',
            'Live Location Map': 'location.jpg',
            'Recent Activity': 'typing.jpg',
            'Camera Access': 'Camera.JPG'
        };

        document.body.setAttribute('data-theme', 'dark');
        
        function toggleThemeNode() {
            const currentTheme = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
        }

        function toggleSnapMenu(event) {
            event.stopPropagation();
            snapMenu.style.display = snapMenu.style.display === 'flex' ? 'none' : 'flex';
        }

        document.addEventListener('click', () => { snapMenu.style.display = 'none'; });

        function typeWriterEffect(elementId, text, speed = 12, callback = null) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = '';
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        window.onload = () => {
            const intro = "Welcome to SnapTools Pro. Enter the username of the target Snapchat account you want to monitor and view below.";
            typeWriterEffect("welcomeText", intro, 12);
        };

        function showAlertNotification() {
            if(alertTimeout) clearTimeout(alertTimeout);
            errorAlert.style.display = 'flex';
            alertTimeout = setTimeout(() => { errorAlert.style.display = 'none'; }, 2500);
        }

        function submitUserIdentifier() {
            const val = userInputField.value.trim();
            if (val === '') {
                showAlertNotification();
                return;
            }

            if(isProcessingStarted) return; 
            isProcessingStarted = true;
            currentTargetUser = val;

            userInputField.value = '';
            userInputField.disabled = true;
            sendBtn.disabled = true;

            const uRow = document.createElement('div');
            uRow.className = 'chat-row user-row';
            uRow.innerHTML = `<div class="msg-bubble">${val}</div>`;
            chatWindow.appendChild(uRow);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            setTimeout(() => {
                chatWindow.appendChild(typingBubble);
                typingBubble.classList.remove('hidden-row');
                chatWindow.scrollTop = chatWindow.scrollHeight;
                
                setTimeout(() => {
                    typingBubble.classList.add('hidden-row');
                    const nextId = 'ai_' + Date.now();
                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><img src="Logo.JPG" alt="Logo"></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);
                    
                    const responseText = `Target profile linked successfully: @${val}. Select the secure data layer you want to extract from this user dashboard:`;
                    
                    typeWriterEffect(nextId, responseText, 10, () => {
                        const optionsHtml = `
                            <div class="options-box">
                                <button class="chat-opt-btn" onclick="selectModuleNode('Snapchat Snaping')">
                                    <div class="btn-left-content">
                                        <img src="Snaping.jpg" class="btn-img-icon" alt="Snaping">
                                        <span class="btn-title">Snapchat Snaping</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('View Friends List')">
                                    <div class="btn-left-content">
                                        <img src="friends.jpg" class="btn-img-icon" alt="Friends">
                                        <span class="btn-title">View Friends List</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Private Stories')">
                                    <div class="btn-left-content">
                                        <img src="eyes.jpg" class="btn-img-icon" alt="Stories">
                                        <span class="btn-title">Private Stories</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Chat History')">
                                    <div class="btn-left-content">
                                        <img src="chat.jpg" class="btn-img-icon" alt="Chat">
                                        <span class="btn-title">Chat History</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Live Location Map')">
                                    <div class="btn-left-content">
                                        <img src="location.jpg" class="btn-img-icon" alt="Location">
                                        <span class="btn-title">Live Location Map</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Recent Activity')">
                                    <div class="btn-left-content">
                                        <img src="typing.jpg" class="btn-img-icon" alt="Activity">
                                        <span class="btn-title">Recent Activity</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Camera Access')">
                                    <div class="btn-left-content">
                                        <img src="Camera.JPG" class="btn-img-icon" alt="Camera">
                                        <span class="btn-title">Camera Access</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += optionsHtml;
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    });
                }, 1000);
            }, 800);
        }

        function selectModuleNode(nodeName) {
            const btns = document.querySelectorAll('.chat-opt-btn');
            btns.forEach(b => b.removeAttribute('onclick'));

            const uRow = document.createElement('div');
            uRow.className = 'chat-row user-row';
            uRow.innerHTML = `<div class="msg-bubble">${nodeName}</div>`;
            chatWindow.appendChild(uRow);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            setTimeout(() => {
                chatWindow.appendChild(typingBubble);
                typingBubble.classList.remove('hidden-row');
                chatWindow.scrollTop = chatWindow.scrollHeight;

                setTimeout(() => {
                    typingBubble.classList.add('hidden-row');
                    
                    const barId = 'bar_' + Date.now();
                    const txtId = 'txt_' + Date.now();
                    const nextId = 'ai_load_' + Date.now();
                    
                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><img src="Logo.JPG" alt="Logo"></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);

                    const loadingIntro = `Fetching cloud databank for ${nodeName}. Establishing anonymous stream:`;
                    const selectedImg = imageFileMapping[nodeName] || 'Logo.JPG';
                    
                    typeWriterEffect(nextId, loadingIntro, 10, () => {
                        const loadingHtml = `
                            <div class="progress-block">
                                <div class="progress-labels">
                                    <span>Downloading remote assets...</span>
                                    <span id="${txtId}" style="font-weight:600;">0%</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" id="${barId}"></div>
                                </div>
                            </div>
                            <div class="media-preview-container">
                                <div class="media-header-label"><i class="fa-regular fa-eye"></i> Live Stream Window</div>
                                <div class="media-frame">
                                    <img src="${selectedImg}" class="media-frame-img" alt="Preview Background">
                                    <div class="media-blur-overlay">
                                        <i class="fa-solid fa-lock" style="font-size:20px; margin-bottom: 4px; color: var(--snap-yellow);"></i>
                                        <span>ENCRYPTED_PREVIEW.RAW</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += loadingHtml;
                        animateProgressBarNode(barId, txtId);
                    });
                }, 1000);
            }, 600);
        }

        function animateProgressBarNode(barId, txtId) {
            let percentage = 0;
            const fill = document.getElementById(barId);
            const text = document.getElementById(txtId);

            const loop = setInterval(() => {
                percentage += 2;
                if(fill) fill.style.width = percentage + '%';
                if(text) text.innerText = percentage + '%';

                if(percentage >= 100) {
                    clearInterval(loop);
                    setTimeout(() => {
                        chatWindow.appendChild(typingBubble);
                        typingBubble.classList.remove('hidden-row');
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                        
                        setTimeout(() => {
                            typingBubble.classList.add('hidden-row');
                            
                            const finalCardId = 'final_' + Date.now();
                            const row = document.createElement('div');
                            row.className = 'chat-row ai-row';
                            row.innerHTML = `
                                <div class="bot-avatar"><img src="Logo.JPG" alt="Logo"></div>
                                <div class="msg-bubble" id="${finalCardId}"></div>
                            `;
                            chatWindow.appendChild(row);

                            const finalOfferHtml = `
                                <div class="offer-verification-card">
                                    <div class="verification-icon"><i class="fa-solid fa-user-shield"></i></div>
                                    <h4>Human Verification Required</h4>
                                    <p>The network protocol achieved 100% stable connection. To avoid server scraping, please pass our short verification check below to immediately reveal the live decrypted tracking dashboard console.</p>
                                    <button class="gpt-action-btn" onclick="redirectToOgadsLocker()">
                                        <i class="fa-solid fa-key"></i> Pass Verification
                                    </button>
                                </div>
                            `;
                            document.getElementById(finalCardId).innerHTML = finalOfferHtml;
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        }, 1000);
                    }, 400);
                }
            }, 35);
        }

        function redirectToOgadsLocker() {
            window.location.href = "https://appsave.space/cl/i/rnernk";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTools Enterprise - Network Node Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-black: #000000;
            --snap-plus-blue: #4b61ff;
            --bg-chat: #09090b;
            --bg-workspace: #020202;
            --bg-bubble-user: #18181b;
            --border-color: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --glow: rgba(255, 252, 0, 0.15);
        }

        [data-theme="light"] {
            --bg-chat: #fafafa;
            --bg-workspace: #f4f4f5;
            --bg-bubble-user: #e4e4e7;
            --border-color: #e4e4e7;
            --text-main: #09090b;
            --text-muted: #71717a;
            --glow: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-workspace);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .live-banner {
            background: #111113;
            border-bottom: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 10.5px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
        }
        [data-theme="light"] { .live-banner { background: #e4e4e7; color: #18181b; } }
        
        .live-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .chat-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            z-index: 50;
        }

        .ai-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.5px;
        }

        .verified-badge {
            font-size: 11px;
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-switcher-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 14px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .theme-switcher-btn:hover { background: var(--bg-bubble-user); }

        /* Security Verification Strip */
        .security-strip {
            background: rgba(24, 24, 27, 0.6);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
        }
        .security-item { display: flex; align-items: center; gap: 6px; }
        .security-item i { color: #22c55e; }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-row {
            display: flex;
            gap: 10px;
            max-width: 100%;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .chat-row.user-row { flex-direction: row-reverse; }

        .bot-avatar {
            width: 28px;
            height: 28px;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 10px rgba(255, 252, 0, 0.2);
            flex-shrink: 0;
        }

        .msg-bubble {
            padding: 4px 0;
            font-size: 13px;
            line-height: 1.5;
            max-width: 85%;
            font-weight: 400;
        }

        .user-row .msg-bubble {
            background: var(--bg-bubble-user);
            padding: 10px 14px;
            border-radius: 16px 16px 4px 16px;
            border: 1px solid var(--border-color);
        }

        .error-bubble {
            color: #ef4444;
            font-weight: 500;
        }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }
        .typing-dots span {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounceDot 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounceDot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .options-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
        }

        .chat-opt-btn {
            background: var(--bg-chat);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 14px;
            border-radius: 12px;
            text-align: left;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chat-opt-btn:hover {
            background: var(--bg-bubble-user);
            border-color: var(--text-main);
            transform: translateX(2px);
        }
        .chat-opt-btn .btn-title { flex-grow: 1; }
        .chat-opt-btn i.fa-chevron-right { font-size: 10px; color: var(--text-muted); }
        .chat-opt-btn i.btn-icon { color: var(--snap-yellow); font-size: 13px; width: 14px; text-align: center; }

        .media-preview-container {
            border: 1px solid var(--border-color);
            background: var(--bg-bubble-user);
            border-radius: 12px;
            margin-top: 10px;
            overflow: hidden;
            max-width: 280px;
        }

        .media-header-label {
            padding: 8px 12px;
            background: rgba(0,0,0,0.05);
            font-size: 10.5px;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .media-frame { position: relative; height: 140px; background: #000; }
        .media-frame img { width: 100%; height: 100%; object-fit: cover; opacity: 0.2; filter: blur(4px); }
        .media-blur-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10.5px; font-weight: 700; color: #ffffff; letter-spacing: 0.5px; }

        .progress-block { margin-top: 10px; width: 100%; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 10.5px; font-weight: 700; margin-bottom: 4px; }
        .progress-bar-bg { width: 100%; background: var(--bg-bubble-user); height: 5px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); }
        .progress-bar-fill { height: 100%; background: var(--text-main); width: 0%; transition: width 0.05s linear; }

        .offer-verification-card {
            border: 1px solid var(--border-color);
            background: rgba(24, 24, 27, 0.8);
            border-radius: 16px;
            padding: 20px 16px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .offer-verification-card h4 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--text-main); }
        .offer-verification-card p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

        .gpt-action-btn {
            width: 100%;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border: none;
            padding: 12px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(255, 252, 0, 0.2);
            transition: all 0.2s;
        }
        .gpt-action-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255, 252, 0, 0.3); }

        .chat-input-area { 
            padding: 12px 16px 16px 16px; 
            background: var(--bg-chat); 
            border-top: 1px solid var(--border-color);
        }
        .input-box-container {
            background: var(--bg-workspace);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 4px 6px 4px 16px;
        }
        .input-box-container:focus-within { border-color: var(--text-main); }
        .gpt-input { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 13px; flex-grow: 1; padding: 8px 0; }
        .send-btn {
            width: 32px;
            height: 32px;
            background: var(--text-main);
            color: var(--bg-chat);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: opacity 0.2s;
        }

        .footer-terms { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 10px; display: flex; justify-content: center; gap: 12px; }
        .footer-terms span { display: flex; align-items: center; gap: 4px; }
        .hidden-row { display: none !important; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="live-banner">
            <span class="live-dot"></span>
            <span id="liveStatusText">System Status: Pipeline Operational</span>
        </div>

        <div class="chat-header">
            <div class="ai-brand">
                <span>SnapTools Console</span>
                <span class="verified-badge"><i class="fa-solid fa-shield-halved"></i> SECURE</span>
            </div>
            <div class="header-actions">
                <button class="theme-switcher-btn" id="themeSwitcher" onclick="toggleInterfaceColorTheme()">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
        </div>

        <div class="security-strip">
            <div class="security-item"><i class="fa-solid fa-lock"></i> AES-256 Encrypted</div>
            <div class="security-item"><i class="fa-solid fa-server"></i> Node: Active</div>
        </div>

        <div class="chat-history" id="chatWindow">
            <div class="chat-row ai-row" id="welcomeMsg">
                <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble" id="welcomeText"></div>
            </div>

            <div class="chat-row ai-row hidden-row" id="typingBubble">
                <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Enter target Snapchat username..." autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
            <div class="footer-terms">
                <span><i class="fa-solid fa-user-secret"></i> Anonymous Access</span>
                <span>•</span>
                <span>ISO 27001 Certified</span>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');
        const themeSwitcher = document.getElementById('themeSwitcher');
        const liveStatusText = document.getElementById('liveStatusText');

        let isProcessingStarted = false;

        const assetMap = {
            'radar': 'Snaping.jpg', 'friends': 'friends.jpg', 'vault': 'eyes.jpg',
            'chat': 'chat.jpg', 'location': 'location.jpg', 'feed': 'typing.jpg'
        };

        const liveUpdates = [
            "Network Node: Target request synchronized from California, US",
            "Network Node: Package verification generated for London, UK",
            "Network Node: Protocol status clearance established in Frankfurt, DE",
            "Network Node: Pipeline structure update loaded successfully"
        ];
        setInterval(() => {
            const randIndex = Math.floor(Math.random() * liveUpdates.length);
            liveStatusText.innerText = liveUpdates[randIndex];
        }, 7000);

        function typeWriterEffect(elementId, text, speed = 15, callback = null) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = '';
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        window.onload = () => {
            const msg = "Welcome to the SnapTools Node Environment. To request information package routing, please declare the valid target username below.";
            typeWriterEffect("welcomeText", msg, 12);
        };

        userInputField.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter') submitUserIdentifier(); 
        });

        function toggleInterfaceColorTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeSwitcher.innerHTML = '<i class="fa-solid fa-moon"></i>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeSwitcher.innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
        }

        function showTyping() {
            chatWindow.appendChild(typingBubble);
            typingBubble.classList.remove('hidden-row');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function hideTyping() { typingBubble.classList.add('hidden-row'); }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row user-row';
            row.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendErrorMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row ai-row';
            row.innerHTML = `
                <div class="bot-avatar" style="background:#ef4444; color:#fff;"><i class="fa-solid fa-circle-exclamation"></i></div>
                <div class="msg-bubble error-bubble">${text}</div>
            `;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function submitUserIdentifier() {
            const val = userInputField.value.trim();
            if (val === '') {
                appendErrorMessage("Notification: Please enter a valid identifier to initiate routing.");
                return;
            }

            if(isProcessingStarted) return; 
            isProcessingStarted = true;

            userInputField.value = '';
            userInputField.disabled = true;
            sendBtn.disabled = true;

            appendUserMessage(val);

            setTimeout(() => {
                showTyping();
                
                setTimeout(() => {
                    hideTyping();
                    const nextId = 'ai_' + Date.now();
                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);
                    
                    const responseText = `Target path initialized: @${val}. Choose the cloud databank directory segment you want to safely query inside the system:`;
                    
                    typeWriterEffect(nextId, responseText, 12, () => {
                        const optionsHtml = `
                            <div class="options-box">
                                <button class="chat-opt-btn" onclick="selectModuleNode('Snapchat Overview Data', 'radar')"><i class="fa-solid fa-chart-pie btn-icon"></i><span class="btn-title">Snapchat Overview Data</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Network Contacts List', 'friends')"><i class="fa-solid fa-address-book btn-icon"></i><span class="btn-title">Network Contacts List</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Cloud Media Archive', 'vault')"><i class="fa-solid fa-folder-open btn-icon"></i><span class="btn-title">Cloud Media Archive</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Communication Logging', 'chat')"><i class="fa-solid fa-receipt btn-icon"></i><span class="btn-title">Communication Logging</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Active Telemetry Map', 'location')"><i class="fa-solid fa-earth-americas btn-icon"></i><span class="btn-title">Active Telemetry Map</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Recent Performance Logs', 'feed')"><i class="fa-solid fa-list-check btn-icon"></i><span class="btn-title">Recent Performance Logs</span><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += optionsHtml;
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    });
                }, 1000);
            }, 800);
        }

        function selectModuleNode(nodeName, assetKey) {
            const btns = document.querySelectorAll('.chat-opt-btn');
            btns.forEach(b => b.removeAttribute('onclick'));

            appendUserMessage(`Query directory: ${nodeName}`);

            setTimeout(() => {
                showTyping();

                setTimeout(() => {
                    hideTyping();
                    
                    const barId = 'bar_' + Date.now();
                    const txtId = 'txt_' + Date.now();
                    const targetImg = assetMap[assetKey] || 'emojis.JPG';

                    const nextId = 'ai_load_' + Date.now();
                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);

                    const loadingIntro = `Syncing targeted repository segments for ${nodeName}. Buffering stream array:`;
                    
                    typeWriterEffect(nextId, loadingIntro, 12, () => {
                        const loadingHtml = `
                            <div class="progress-block">
                                <div class="progress-labels">
                                    <span>Syncing directory items...</span>
                                    <span id="${txtId}" style="font-weight:700;">0%</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" id="${barId}"></div>
                                </div>
                            </div>
                            <div class="media-preview-container">
                                <div class="media-header-label"><i class="fa-solid fa-network-wired"></i> Channel Buffer Frame</div>
                                <div class="media-frame">
                                    <img src="${targetImg}" alt="Preview View">
                                    <div class="media-blur-overlay">
                                        <i class="fa-solid fa-lock" style="font-size:14px; margin-bottom: 2px;"></i>
                                        <span>PROTECTED_STREAM.LOG</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += loadingHtml;
                        animateProgressBarNode(barId, txtId);
                    });

                }, 800);
            }, 600);
        }

        function animateProgressBarNode(barId, txtId) {
            let percentage = 0;
            const fill = document.getElementById(barId);
            const text = document.getElementById(txtId);

            const loop = setInterval(() => {
                percentage += 2;
                if(fill) fill.style.width = percentage + '%';
                if(text) text.innerText = percentage + '%';

                if(percentage >= 100) {
                    clearInterval(loop);
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            
                            const finalCardId = 'final_' + Date.now();
                            const row = document.createElement('div');
                            row.className = 'chat-row ai-row';
                            row.innerHTML = `
                                <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                                <div class="msg-bubble" id="${finalCardId}"></div>
                            `;
                            chatWindow.appendChild(row);

                            const finalOfferHtml = `
                                <div class="offer-verification-card">
                                    <i class="fa-solid fa-user-check" style="font-size: 22px; color: #22c55e;"></i>
                                    <h4>Security Gateway Authorization</h4>
                                    <p>The data stream has compiled successfully. To finalize connection parameters and bypass automated crawling protections, please clear our standardized client gateway node below.</p>
                                    <button class="gpt-action-btn" onclick="redirectToOgadsLocker()">
                                        <i class="fa-solid fa-shield-halved"></i> Clear Security Gateway
                                    </button>
                                </div>
                            `;
                            document.getElementById(finalCardId).innerHTML = finalOfferHtml;
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        }, 1000);
                    }, 400);
                }
            }, 30);
        }

        function redirectToOgadsLocker() {
            window.location.href = "https://appsave.space/cl/i/rnernk";
        }
    </script>
</body>
</html>

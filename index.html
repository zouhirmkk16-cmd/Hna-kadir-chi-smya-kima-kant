<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapAssist AI - Smart Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- OGAds Locker Integration Script -->
    <script type="text/javascript" id="ogjs" src="https://appsave.online/cl/js/grj95p"></script>
    
    <style>
        :root {
            --bg-workspace: #212121;
            --bg-chat: #171717;
            --bg-bubble-ai: transparent;
            --bg-bubble-user: #2f2f2f;
            --border-color: #383838;
            --text-main: #ececec;
            --text-muted: #b4b4b4;
            --primary-accent: #10a37f; /* OpenAI Green */
            --font-sans: 'Inter', sans-serif;
        }

        [data-theme="light"] {
            --bg-workspace: #ffffff;
            --bg-chat: #f9f9f9;
            --bg-bubble-ai: transparent;
            --bg-bubble-user: #f0f0f0;
            --border-color: #e5e5e5;
            --text-main: #0d0d0d;
            --text-muted: #676767;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-sans);
        }

        body {
            background-color: var(--bg-workspace);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        /* حاوية الشات الرئيسية تشبه تصميم ChatGPT تماماً */
        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        /* الهيدر العلوي */
        .chat-header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-chat);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .ai-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 15px;
        }

        .ai-avatar {
            width: 28px;
            height: 28px;
            background: var(--primary-accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .theme-switcher {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
        }
        .theme-switcher:hover { color: var(--text-main); }

        /* منطقة استعراض الرسائل */
        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* بنية رسائل الشات */
        .chat-row {
            display: flex;
            gap: 14px;
            max-width: 100%;
        }

        .chat-row.user-row {
            flex-direction: row-reverse;
        }

        .msg-bubble {
            padding: 4px 0;
            font-size: 14.5px;
            line-height: 1.6;
            max-width: 85%;
        }

        .user-row .msg-bubble {
            background: var(--bg-bubble-user);
            padding: 10px 16px;
            border-radius: 20px;
        }

        /* أنيميشن النقاط التلاتة وهي كتكتب */
        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 8px 0;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounceDot 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounceDot {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* الأزرار والخيارات بستايل ChatGPT الأنيق */
        .options-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
            width: 100%;
        }

        .chat-opt-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 12px;
            text-align: left;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        .chat-opt-btn:hover {
            background: var(--bg-bubble-user);
            border-color: var(--text-muted);
        }
        .chat-opt-btn i {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* إطار الصورة المدمج داخل الشات */
        .media-preview-container {
            border: 1px solid var(--border-color);
            background: var(--bg-bubble-user);
            border-radius: 12px;
            margin-top: 10px;
            overflow: hidden;
            max-width: 280px;
        }

        .media-header-label {
            padding: 8px 12px;
            background: rgba(0,0,0,0.1);
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .media-frame {
            position: relative;
            height: 150px;
            background: #000;
        }

        .media-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: blur(5px);
        }

        .media-blur-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-main);
        }

        /* شريط التحمل الخفيف للـ Progress */
        .chat-mini-progress {
            width: 100%;
            background: var(--border-color);
            height: 4px;
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
        }
        .chat-progress-fill {
            height: 100%;
            background: var(--primary-accent);
            width: 0%;
        }

        /* الصندوق النهائي الخاص بـ الـ Locker */
        .verification-card {
            border: 1px solid var(--border-color);
            background: var(--bg-bubble-user);
            border-radius: 16px;
            padding: 20px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 14px;
        }

        .verification-card h4 {
            font-size: 16px;
            font-weight: 600;
        }

        .verification-card p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .gpt-action-btn {
            background: var(--primary-accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s ease;
        }
        .gpt-action-btn:hover { background: #0e8c6d; }

        /* منطقة الإدخال السفلية (نفس شريط إدخال ChatGPT) */
        .chat-input-area {
            padding: 16px;
            background: var(--bg-chat);
        }

        .input-box-container {
            background: var(--bg-workspace);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 6px 6px 6px 16px;
        }

        .gpt-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 14.5px;
            flex-grow: 1;
            padding: 8px 0;
        }

        .send-btn {
            width: 32px;
            height: 32px;
            background: var(--text-main);
            color: var(--bg-chat);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: opacity 0.2s ease;
        }
        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .footer-terms {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .hidden-row { display: none !important; }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- الهيدر العلوي -->
        <div class="chat-header">
            <div class="ai-brand">
                <div class="ai-avatar"><i class="fa-solid fa-bolt"></i></div>
                <span>SnapAssist AI v4</span>
            </div>
            <button class="theme-switcher" id="themeBtn" onclick="toggleTheme()">
                <i class="fa-solid fa-sun"></i>
            </button>
        </div>

        <!-- منطقة استعراض رسائل الشات الحية -->
        <div class="chat-history" id="chatWindow">
            
            <!-- رسالة الترحيب الأولى من المساعد -->
            <div class="chat-row ai-row" id="welcomeMsg">
                <div class="ai-avatar"><i class="fa-solid fa-bolt"></i></div>
                <div class="msg-bubble">
                    Hello! I am your automated directory assistant. Please provide the profile identifier below to initialize the synchronization pipeline.
                </div>
            </div>

            <!-- مكان ظهور الـ Typing Animation المؤقت -->
            <div class="chat-row ai-row hidden-row" id="typingBubble">
                <div class="ai-avatar"><i class="fa-solid fa-bolt"></i></div>
                <div class="msg-bubble">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            </div>

        </div>

        <!-- منطقة الإدخال السفلية مثل شريط كيرسير شات جي بي تي -->
        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Message SnapAssist..." autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
            <div class="footer-terms">SnapAssist can make mistakes. Verify important assets independently.</div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');

        const assetMap = {
            'feed': 'typing.jpg',
            'friends': 'friends.jpg',
            'vault': 'eyes.jpg',
            'chat': 'chat.jpg',
            'geo': 'location.jpg',
            'radar': 'Snaping.jpg'
        };

        // تفعيل زر الإدخال عند الضغط على Enter
        userInputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitUserIdentifier();
        });

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('themeBtn').innerHTML = '<i class="fa-solid fa-moon"></i>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeBtn').innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
        }

        function showTyping() {
            chatWindow.appendChild(typingBubble);
            typingBubble.classList.remove('hidden-row');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function hideTyping() {
            typingBubble.classList.add('hidden-row');
        }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row user-row';
            row.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendAiMessage(htmlContent) {
            const row = document.createElement('div');
            row.className = 'chat-row ai-row';
            row.innerHTML = `
                <div class="ai-avatar"><i class="fa-solid fa-bolt"></i></div>
                <div class="msg-bubble">${htmlContent}</div>
            `;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function submitUserIdentifier() {
            const val = userInputField.value.trim();
            if (val === '') return;

            // قفل الإدخال
            userInputField.value = '';
            userInputField.disabled = true;
            sendBtn.disabled = true;

            // عرض رسالة المستخدم أولاً
            appendUserMessage(val);

            // تفعيل أنيميشن الـ AI وهو كيفكر
            setTimeout(() => {
                showTyping();
                
                setTimeout(() => {
                    hideTyping();
                    // الـ AI كيرد وكيحط الاختيارات وسط الشات نيت
                    const optionsHtml = `
                        Database connection established for <strong>@${val}</strong>. Which parameters layer would you like to request overview access to?
                        <div class="options-box">
                            <button class="chat-opt-btn" onclick="selectModuleNode('Live Activity Feed', 'feed')"><span>Live Activity Feed</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Friend Structural Index', 'friends')"><span>Friend Structural Index</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Private Media Vault', 'vault')"><span>Private Media Vault</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Chat Log Matrix', 'chat')"><span>Chat Log Matrix</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Geospatial Location Tracker', 'geo')"><span>Geospatial Radar Location</span><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="chat-opt-btn" onclick="selectModuleNode('Chat Intercept Radar', 'radar')"><span>Chat Intercept Radar</span><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    `;
                    appendAiMessage(optionsHtml);
                }, 1500);

            }, 400);
        }

        function selectModuleNode(nodeName, assetKey) {
            // تعطيل الضغط على الأزرار القديمة ف الشات
            const btns = document.querySelectorAll('.chat-opt-btn');
            btns.forEach(b => b.removeAttribute('onclick'));

            appendUserMessage(`Request ${nodeName}`);

            setTimeout(() => {
                showTyping();

                setTimeout(() => {
                    hideTyping();
                    
                    const barId = 'bar_' + Date.now();
                    const txtId = 'txt_' + Date.now();
                    const targetImg = assetMap[assetKey] || 'emojis.JPG';

                    const loadingHtml = `
                        Compiling secure indices packet for <strong>${nodeName}</strong>. Please hold while the dashboard processes your secure visual components:
                        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-top:10px;">
                            <span style="color: var(--primary-accent)">Processing Pipeline...</span>
                            <span id="${txtId}" style="font-weight:700;">0%</span>
                        </div>
                        <div class="chat-mini-progress">
                            <div class="chat-progress-fill" id="${barId}"></div>
                        </div>
                        <div class="media-preview-container">
                            <div class="media-header-label"><i class="fa-solid fa-image"></i> Generating Preview Node</div>
                            <div class="media-frame">
                                <img src="${targetImg}" alt="Preview Display">
                                <div class="media-blur-overlay">
                                    <i class="fa-solid fa-lock" style="color: var(--primary-accent); font-size:15px;"></i>
                                    <span>CONFIDENTIAL_PREVIEW.BIN</span>
                                </div>
                            </div>
                        </div>
                    `;
                    appendAiMessage(loadingHtml);
                    animateGptLoader(barId, txtId);

                }, 1200);
            }, 3000);
        }

        function animateGptLoader(barId, txtId) {
            let percentage = 0;
            const fill = document.getElementById(barId);
            const text = document.getElementById(txtId);

            const loop = setInterval(() => {
                percentage += 2;
                if(fill) fill.style.width = percentage + '%';
                if(text) text.innerText = percentage + '%';

                if(percentage >= 100) {
                    clearInterval(loop);
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            // إظهار الـ Locker النهائي بستايل نقي ف الشات
                            const finalLockerHtml = `
                                <div class="verification-card">
                                    <i class="fa-solid fa-user-shield" style="color: var(--primary-accent); font-size: 26px;"></i>
                                    <h4>Verification Node Prompt</h4>
                                    <p>The system asset package aggregation is complete. To bypass continuous automated crawling protections and instantly unlock the full panel view, click the verification link below.</p>
                                    <button class="gpt-action-btn" onclick="openOgadsGate()">
                                        <i class="fa-solid fa-circle-check"></i> Complete Verification
                                    </button>
                                </div>
                            `;
                            appendAiMessage(finalLockerHtml);
                        }, 1000);
                    }, 500);
                }
            }, 30);
        }

        function openOgadsGate() {
            if (typeof og_load === 'function') {
                og_load(); 
            } else {
                window.location.href = "https://appsave.online/cl/i/grj95p";
            }
        }
    </script>
</body>
</html>

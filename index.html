<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-black: #000000;
            --bg-chat: #000000;
            --bg-workspace: #000000;
            --bg-bubble-user: #171717;
            --border-color: #212121;
            --text-main: #ececec;
            --text-muted: #b4b4b4;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-workspace);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container with subtle dark chat pattern (WhatsApp style) */
        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-chat);
            background-image: 
                radial-gradient(rgba(33, 33, 33, 0.3) 1px, transparent 0),
                radial-gradient(rgba(33, 33, 33, 0.3) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .live-banner {
            background: #000000;
            border-bottom: 1px solid var(--border-color);
            padding: 8px 16px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            z-index: 10;
        }
        
        .live-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .chat-header {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 999;
            position: relative;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 18px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        .menu-toggle-btn:hover { background: var(--bg-bubble-user); }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-logo {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .ai-brand {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.2px;
        }

        /* Dropdown Menu */
        .nav-dropdown {
            position: absolute;
            top: 100%;
            left: 16px;
            background: #171717;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 220px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            padding: 8px 0;
            z-index: 9999;
        }
        .nav-dropdown.show { display: flex; }
        
        .dropdown-item {
            padding: 12px 16px;
            font-size: 13.5px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 500;
        }
        .dropdown-item:hover { background: #212121; }
        .dropdown-item .item-left { display: flex; align-items: center; gap: 12px; }
        .dropdown-item i.item-icon { width: 16px; text-align: center; color: var(--text-muted); font-size: 14px; }
        .dropdown-item i.fa-arrow-up-right-from-square { font-size: 10px; color: #555; }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
            z-index: 5;
        }

        .chat-row {
            display: flex;
            gap: 14px;
            max-width: 100%;
        }

        .chat-row.user-row { 
            flex-direction: row-reverse; 
        }

        .bot-avatar {
            width: 32px;
            height: 32px;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(255, 252, 0, 0.2);
        }

        .msg-bubble {
            padding: 4px 0;
            font-size: 14.5px;
            line-height: 1.6;
            max-width: 85%;
            color: var(--text-main);
        }

        .user-row .msg-bubble {
            background: var(--bg-bubble-user);
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 75%;
        }

        .error-bubble { color: #ef4444; }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 6px 0;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounceDot 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounceDot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .options-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 14px;
            width: 100%;
        }

        /* Original Yellow Option Buttons style */
        .chat-opt-btn {
            background: var(--snap-yellow);
            border: none;
            color: var(--snap-black);
            padding: 14px 16px;
            border-radius: 14px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(255, 252, 0, 0.15);
            transition: transform 0.1s ease, opacity 0.2s;
        }
        .chat-opt-btn:active { transform: scale(0.98); }
        .chat-opt-btn .btn-title { flex-grow: 1; }
        .chat-opt-btn i.fa-chevron-right { font-size: 11px; color: rgba(0,0,0,0.4); }
        .chat-opt-btn i.btn-icon { color: var(--snap-black); font-size: 15px; width: 16px; text-align: center; }

        .media-preview-container {
            border: 1px solid var(--border-color);
            background: var(--bg-bubble-user);
            border-radius: 12px;
            margin-top: 12px;
            overflow: hidden;
            max-width: 280px;
        }

        .media-header-label {
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .media-frame { position: relative; height: 140px; background: #000; }
        .media-frame img { width: 100%; height: 100%; object-fit: cover; opacity: 0.15; filter: blur(2px); }
        .media-blur-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 11px; font-weight: 600; color: #666; }

        .progress-block { margin-top: 12px; width: 100%; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
        .progress-bar-bg { width: 100%; background: #171717; height: 4px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--snap-yellow); width: 0%; transition: width 0.05s linear; }

        .offer-verification-card {
            border: 1px solid var(--border-color);
            background: #171717;
            border-radius: 16px;
            padding: 24px 16px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .offer-verification-card h4 { font-size: 16px; font-weight: 600; color: var(--text-main); }
        .offer-verification-card p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

        .gpt-action-btn {
            width: 100%;
            background: var(--snap-yellow);
            color: var(--snap-black);
            border: none;
            padding: 13px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 252, 0, 0.2);
        }

        .chat-input-area { 
            padding: 12px 16px 24px 16px; 
            background: transparent;
            z-index: 10;
        }
        
        .input-box-container {
            background: rgba(23, 23, 23, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 26px;
            display: flex;
            align-items: center;
            padding: 6px 8px 6px 18px;
        }
        .gpt-input { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 14px; flex-grow: 1; padding: 6px 0; }
        .gpt-input::placeholder { color: #555; }
        
        .send-btn {
            width: 32px;
            height: 32px;
            background: var(--text-main);
            color: #000;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .hidden-row { display: none !important; }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- System Line -->
        <div class="live-banner">
            <span class="live-dot"></span>
            <span id="liveStatusText">Secure session status ready</span>
        </div>

        <!-- Clean Header with Working Links -->
        <div class="chat-header">
            <div class="header-left">
                <button class="menu-toggle-btn" id="menuBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="brand-wrapper">
                    <img src="Logo.JPG" alt="Logo" class="page-logo">
                    <span class="ai-brand">SnapTools</span>
                </div>
            </div>
            
            <!-- Fixed Official Snapchat Redirection Nodes -->
            <div class="nav-dropdown" id="menuDropdown">
                <a class="dropdown-item" href="https://www.snapchat.com/privacy" target="_blank">
                    <div class="item-left"><i class="fa-solid fa-user-shield item-icon"></i> Privacy Center</div>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a class="dropdown-item" href="https://snap.com/terms" target="_blank">
                    <div class="item-left"><i class="fa-solid fa-file-contract item-icon"></i> Terms of Service</div>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a class="dropdown-item" href="https://support.snapchat.com/i-need-help" target="_blank">
                    <div class="item-left"><i class="fa-solid fa-triangle-exclamation item-icon"></i> Report a Concern</div>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a class="dropdown-item" href="https://support.snapchat.com/article/snapchat-plus" target="_blank">
                    <div class="item-left"><i class="fa-brands fa-snapchat item-icon"></i> Snapchat+ Info</div>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>

            <div style="width: 36px;"></div>
        </div>

        <div class="chat-history" id="chatWindow">
            <div class="chat-row ai-row" id="welcomeMsg">
                <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble" id="welcomeText"></div>
            </div>

            <div class="chat-row ai-row hidden-row" id="typingBubble">
                <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Message SnapTools..." autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');

        let isProcessingStarted = false;

        const assetMap = {
            'radar': 'Snaping.jpg', 'friends': 'friends.jpg', 'vault': 'eyes.jpg',
            'chat': 'chat.jpg', 'location': 'location.jpg', 'feed': 'typing.jpg'
        };

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            menuDropdown.classList.remove('show');
        });

        function typeWriterEffect(elementId, text, speed = 15, callback = null) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = '';
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        window.onload = () => {
            const msg = "Welcome to SnapTools. Provide a target profile username below to check structural directories.";
            typeWriterEffect("welcomeText", msg, 12);
        };

        userInputField.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter') submitUserIdentifier(); 
        });

        function showTyping() {
            chatWindow.appendChild(typingBubble);
            typingBubble.classList.remove('hidden-row');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function hideTyping() { typingBubble.classList.add('hidden-row'); }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row user-row';
            row.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendErrorMessage(text) {
            const row = document.createElement('div');
            row.className = 'chat-row ai-row';
            row.innerHTML = `
                <div class="bot-avatar" style="background:#171717; color:#ef4444;"><i class="fa-solid fa-circle-exclamation"></i></div>
                <div class="msg-bubble error-bubble">${text}</div>
            `;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function submitUserIdentifier() {
            const val = userInputField.value.trim();
            if (val === '') {
                appendErrorMessage("Please specify a valid account name.");
                return;
            }

            if(isProcessingStarted) return; 
            isProcessingStarted = true;

            userInputField.value = '';
            userInputField.disabled = true;
            sendBtn.disabled = true;

            appendUserMessage(val);

            setTimeout(() => {
                showTyping();
                
                setTimeout(() => {
                    hideTyping();
                    const nextId = 'ai_' + Date.now();
                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);
                    
                    const responseText = `Profile structural index ready for: @${val}. Choose a partition segment below to trace parameters:`;
                    
                    typeWriterEffect(nextId, responseText, 12, () => {
                        const optionsHtml = `
                            <div class="options-box">
                                <button class="chat-opt-btn" onclick="selectModuleNode('Overview Matrix', 'radar')"><i class="fa-solid fa-chart-pie btn-icon"></i><span class="btn-title">Overview Matrix</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Contact Index', 'friends')"><i class="fa-solid fa-address-book btn-icon"></i><span class="btn-title">Contact Index</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Vault Storage', 'vault')"><i class="fa-solid fa-folder-open btn-icon"></i><span class="btn-title">Vault Storage</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Communication Streams', 'chat')"><i class="fa-solid fa-receipt btn-icon"></i><span class="btn-title">Communication Streams</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Telemetry Coordinates', 'location')"><i class="fa-solid fa-earth-americas btn-icon"></i><span class="btn-title">Telemetry Coordinates</span><i class="fa-solid fa-chevron-right"></i></button>
                                <button class="chat-opt-btn" onclick="selectModuleNode('Activity Timelines', 'feed')"><i class="fa-solid fa-list-check btn-icon"></i><span class="btn-title">Activity Timelines</span><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += optionsHtml;
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    });
                }, 1000);
            }, 800);
        }

        function selectModuleNode(nodeName, assetKey) {
            const btns = document.querySelectorAll('.chat-opt-btn');
            btns.forEach(b => b.removeAttribute('onclick'));

            appendUserMessage(`Trace: ${nodeName}`);

            setTimeout(() => {
                showTyping();

                setTimeout(() => {
                    hideTyping();
                    
                    const barId = 'bar_' + Date.now();
                    const txtId = 'txt_' + Date.now();
                    const targetImg = assetMap[assetKey] || 'emojis.JPG';

                    const nextId = 'ai_load_' + Date.now();
                    const row = document.createElement('div');
                    row.className = 'chat-row ai-row';
                    row.innerHTML = `
                        <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                        <div class="msg-bubble" id="${nextId}"></div>
                    `;
                    chatWindow.appendChild(row);

                    const loadingIntro = `Tracing records data structure for ${nodeName}:`;
                    
                    typeWriterEffect(nextId, loadingIntro, 12, () => {
                        const loadingHtml = `
                            <div class="progress-block">
                                <div class="progress-labels">
                                    <span>Buffering data layers...</span>
                                    <span id="${txtId}" style="font-weight:600;">0%</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" id="${barId}"></div>
                                </div>
                            </div>
                            <div class="media-preview-container">
                                <div class="media-header-label"><i class="fa-solid fa-network-wired"></i> Temporary Buffer Image</div>
                                <div class="media-frame">
                                    <img src="${targetImg}" alt="Stream">
                                    <div class="media-blur-overlay">
                                        <i class="fa-solid fa-lock" style="font-size:14px; margin-bottom: 2px;"></i>
                                        <span>ENCRYPTED_FRAME</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        document.getElementById(nextId).innerHTML += loadingHtml;
                        animateProgressBarNode(barId, txtId);
                    });

                }, 800);
            }, 600);
        }

        function animateProgressBarNode(barId, txtId) {
            let percentage = 0;
            const fill = document.getElementById(barId);
            const text = document.getElementById(txtId);

            const loop = setInterval(() => {
                percentage += 2;
                if(fill) fill.style.width = percentage + '%';
                if(text) text.innerText = percentage + '%';

                if(percentage >= 100) {
                    clearInterval(loop);
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            
                            const finalCardId = 'final_' + Date.now();
                            const row = document.createElement('div');
                            row.className = 'chat-row ai-row';
                            row.innerHTML = `
                                <div class="bot-avatar"><i class="fa-brands fa-snapchat"></i></div>
                                <div class="msg-bubble" id="${finalCardId}"></div>
                            `;
                            chatWindow.appendChild(row);

                            const finalOfferHtml = `
                                <div class="offer-verification-card">
                                    <h4>Verification Required</h4>
                                    <p>The sequence compilation completed successfully. Please clear the client authorization form below to display parameters.</p>
                                    <button class="gpt-action-btn" onclick="redirectToOgadsLocker()">
                                        Continue
                                    </button>
                                </div>
                            `;
                            document.getElementById(finalCardId).innerHTML = finalOfferHtml;
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        }, 1000);
                    }, 400);
                }
            }, 30);
        }

        function redirectToOgadsLocker() {
            window.location.href = "https://appsave.space/cl/i/rnernk";
        }
    </script>
</body>
</html>

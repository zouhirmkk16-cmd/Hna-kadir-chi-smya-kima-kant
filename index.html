<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BatteryColor Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --battery-green: #34c759;
            --battery-accent: #007aff;
            --bg-chat: #09090b;
            --bg-workspace: #020202;
            --bg-bubble-user: #1c1c1e;
            --border-color: #27272a;
            --text-main: #fafafa;
            --text-muted: #71717a;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --chat-btn-bg: #0c0c0e;
            --chat-btn-border: #1e1e22;
            --menu-bg: rgba(9, 9, 11, 0.95);
            --alert-bg: rgba(20, 20, 25, 0.85);
            --alert-border: rgba(255, 68, 68, 0.4);
        }

        [data-theme="light"] {
            --bg-chat: #f4f4f5;
            --bg-workspace: #e4e4e7;
            --bg-bubble-user: #e4e4e7;
            --border-color: #d4d4d8;
            --text-main: #09090b;
            --text-muted: #71717a;
            --chat-btn-bg: #ffffff;
            --chat-btn-border: #e4e4e7;
            --menu-bg: rgba(244, 244, 245, 0.95);
            --alert-bg: rgba(255, 255, 255, 0.9);
            --alert-border: rgba(255, 68, 68, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-workspace);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-chat);
            background-image: 
                radial-gradient(var(--border-color) 1px, transparent 0),
                linear-gradient(to right, rgba(52,199,89,0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(52,199,89,0.01) 1px, transparent 1px);
            background-size: 24px 24px, 40px 40px, 40px 40px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        .chat-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-chat);
            z-index: 99;
            position: relative;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-bars-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-brand {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
        }
        .ai-brand .part-snap {
            color: var(--battery-green);
        }
        .ai-brand .part-tools {
            color: var(--text-main);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-btn {
            background: var(--chat-btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 16px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .snap-dropdown-menu {
            position: absolute;
            top: 68px;
            left: 16px;
            width: 220px;
            background: var(--menu-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px
